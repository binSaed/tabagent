<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TabAgent</title>
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e;
      color: #e4e4e4;
      font-size: 13px;
    }
    h2 { margin: 0 0 8px 0; font-size: 14px; }
    button {
      width: 100%;
      padding: 8px;
      background: #4f9eff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 6px;
      font-size: 13px;
    }
    button:hover { filter: brightness(1.1); }
    p { color: #9b9b9b; font-size: 11px; margin: 8px 0 0 0; }
  </style>
</head>
<body>
  <h2>TabAgent</h2>
  <button id="open-panel">Open side panel</button>
  <p>Use the side panel to connect a provider (Z.AI coding plan recommended) and start automating the active tab.</p>
  <script src="popup.js"></script>
</body>
</html>
