name: Build Extension

# Builds the MV3 extension from source and uploads the built `dist/` directory
# as a downloadable artifact. Users grab the latest build from the Actions tab
# (see the "Download" section in README.md).
on:
  push:
    branches: [main]
  workflow_dispatch: # manual "Run workflow" button

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # lockfile-based cache (package-lock.json)

      - run: npm ci # reproducible install from lockfile
      - run: npm run build # node build.mjs -> dist/ (also generates manifest.json)

      # Upload the dist/ *directory* (not a pre-made zip): upload-artifact@v4
      # always zips the upload on download, so this yields one clean TabAgent.zip
      # with manifest.json at the root — exactly what Chrome's "Load unpacked"
      # expects once unzipped.
      - uses: actions/upload-artifact@v4
        with:
          name: TabAgent
          path: dist
          if-no-files-found: error
          retention-days: 90
